apiVersion: v1
kind: Service
metadata:
  name: brain-tasks-service
  # This annotation tells AWS to provision a Classic ELB.
  # Remove this annotation if you want an NLB instead
  # (NLB requires: service.beta.kubernetes.io/aws-load-balancer-type: "nlb")
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "classic"
spec:
  type: LoadBalancer
  selector:
    app: brain-tasks-app       # must match deployment label exactly
  ports:
    - name: http
      protocol: TCP
      port: 3000               # external port — what users hit
      targetPort: 80           # container port — where nginx listens
