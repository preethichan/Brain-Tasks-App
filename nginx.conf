# ─────────────────────────────────────────────────────────────
# nginx.conf — Brain Tasks App
#
# Handles:
#   - Static file serving from /usr/share/nginx/html
#   - SPA fallback: all unknown paths return index.html
#     so React Router handles them client-side
#   - Gzip compression for faster load times
#   - Cache headers: long TTL for hashed assets, no cache for index.html
# ─────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip static content
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # index.html — never cache (always fetch latest on deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed static assets (JS, CSS) — cache aggressively
    # Vite/CRA generates filenames like main.a1b2c3d4.js
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — React Router client-side routing
    # Any path not matching a real file falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
